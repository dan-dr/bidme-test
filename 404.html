<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Not Found</title>
    <script>
      const legacyStripePaths = ["/bidme/stripe/", "/.bidme/stripe/"];
      const path = window.location.pathname;

      for (const legacyStripePath of legacyStripePaths) {
        const index = path.indexOf(legacyStripePath);
        if (index !== -1) {
          const base = path.slice(0, index);
          const page = path.slice(index + legacyStripePath.length);
          window.location.replace(`${base}/.bidme/pay/stripe/${page}${window.location.search}${window.location.hash}`);
          break;
        }
      }
    </script>
  </head>
  <body>
    <h1>Not Found</h1>
  </body>
</html>
