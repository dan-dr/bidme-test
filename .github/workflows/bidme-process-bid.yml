name: "BidMe: Process Bid"

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

jobs:
  process-bid:
    runs-on: ubuntu-latest
    if: |
      !github.event.issue.pull_request &&
      contains(github.event.comment.body, '```yaml') &&
      contains(toJSON(github.event.issue.labels.*.name), 'bidme')
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Process bid comment
        run: bunx bidme process-bid ${{ github.event.issue.number }} ${{ github.event.comment.id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BIDME_PAT: ${{ secrets.BIDME_PAT }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
