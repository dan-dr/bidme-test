name: "BidMe: Process Bid"

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  process-bid:
    runs-on: ubuntu-latest
    if: |
      !github.event.issue.pull_request &&
      contains(toJSON(github.event.issue.labels.*.name), 'bidme') &&
      (
        (
          contains(github.event.comment.body, '---') &&
          contains(github.event.comment.body, 'bid:')
        ) ||
        (
          startsWith(github.event.comment.body, '/approve') &&
          github.event.comment.user.login == github.repository_owner
        )
      )
    steps:
      - uses: actions/checkout@v4

      - name: Process bid comment
        uses: dan-dr/BIDME.md@main
        with:
          command: process-bid
          issue: ${{ github.event.issue.number }}
          comment: ${{ github.event.comment.id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BIDME_PAT: ${{ secrets.BIDME_PAT }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
