name: "BIDME: Check Payment Grace"

on:
  schedule:
    - cron: "*/15 * * * *"
  repository_dispatch:
    types: [bidme-payment-linked]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  check-grace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check payment grace window
        uses: dan-dr/BIDME.md@main
        with:
          command: check-grace
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BIDME_PAT: ${{ secrets.BIDME_PAT }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
