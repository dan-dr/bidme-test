name: "BidMe: Close Bidding Period"

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  close-bidding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Close bidding period
        uses: dan-dr/BIDME.md@main
        with:
          command: close-bidding
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}

      - name: Commit archive and README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(bidme): update data"
