name: "BIDME: Update Analytics"

on:
  schedule:
    - cron: "0 6 * * *"
  repository_dispatch:
    types: [bidme-click, bidme-payment-linked]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  update-analytics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update analytics
        uses: dan-dr/BIDME.md@main
        with:
          command: update-analytics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BIDME_PAT: ${{ secrets.BIDME_PAT }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
